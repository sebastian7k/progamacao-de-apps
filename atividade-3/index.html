<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Eleitoral</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <img src="logo.png" alt="Logotipo Votação" class="logo">
        
        <h2>Situação Eleitoral</h2>
        <p class="subtitulo">Descubra se você é obrigado a votar este ano.</p>
        
        <div class="input-group">
            <label for="idade">Sua idade</label>
            <input type="number" id="idade" placeholder="Digite sua idade..." min="0">
        </div>
        
        <button id="verificar">Verificar situação</button>

        <div id="resultado" class="escondido">
            <p>Resultado da consulta:</p>
            <div id="boxStatus" class="status-box"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
